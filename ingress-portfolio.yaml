apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-website-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"   # or your ingress controller
spec:
  rules:
    - host: portfolio.yourdomain.com   # change this
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portfolio-website-svc
                port:
                  number: 80